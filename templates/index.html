<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Kyriazidhs AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>K AI</h2>

        <button onclick="showPage('dashboard')">🏠 Dashboard</button>
        <button onclick="showPage('chat')">💬 Chat</button>
        <button onclick="showPage('tools')">🧠 Tools</button>
        <button onclick="showPage('profile')">👤 Profile</button>
        <button onclick="showPage('settings')">⚙️ Settings</button>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- DASHBOARD -->
        <div id="dashboard" class="page active">
            <h1>Welcome to Kyriazidhs AI</h1>
            <p>Αυτό είναι το AI dashboard σου.</p>

            <div class="cards">
                <div class="card">⚡ Quick Ideas</div>
                <div class="card">💻 Build Projects</div>
                <div class="card">🎯 Career Help</div>
                <div class="card">🎥 Content Ideas</div>
            </div>
        </div>

        <!-- CHAT -->
        <div id="chat" class="page">
            
            <div class="ai-actions">
                <button onclick="quickAction('idea')">⚡ Idea</button>
                <button onclick="quickAction('project')">💻 Project</button>
                <button onclick="quickAction('career')">🎯 Career</button>
                <button onclick="quickAction('content')">🎥 Content</button>
                <button onclick="clearChat()">🧹 Clear</button>
            </div>

            <div id="chatbox" class="chatbox"></div>

            <div class="input-area">
                <input id="message" placeholder="Γράψε κάτι...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <!-- TOOLS -->
        <div id="tools" class="page">
            <h1>AI Tools</h1>
            <p>Εδώ θα βάλουμε AI εργαλεία.</p>
        </div>

        <!-- PROFILE -->
        <div id="profile" class="page">
            <h1>Profile</h1>
            <p>Username, goals, info κλπ.</p>
        </div>

        <!-- SETTINGS -->
        <div id="settings" class="page">
            <h1>Settings</h1>
            <p>Theme, AI settings κλπ.</p>
        </div>

    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
